<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>LeadHub — Grow Your Business with Proven Lead Generation</title>
    <meta
      name="description"
      content="LeadHub helps businesses capture, nurture, and convert leads through proven strategies and powerful tools. Explore our services and start scaling today."
    />
    <meta name="robots" content="index, follow, max-snippet:160, max-image-preview:large" />
    <link rel="canonical" href="https://stuartga.github.io/leadhub-ecommerce/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LeadHub" />
    <meta property="og:url" content="https://stuartga.github.io/leadhub-ecommerce/" />
    <meta property="og:title" content="LeadHub — Grow Your Business with Proven Lead Generation" />
    <meta
      property="og:description"
      content="LeadHub helps businesses capture, nurture, and convert leads through proven strategies and powerful tools. Explore our services and start scaling today."
    />
    <meta property="og:image" content="https://stuartga.github.io/leadhub-ecommerce/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LeadHub — Grow Your Business with Proven Lead Generation" />
    <meta
      name="twitter:description"
      content="LeadHub helps businesses capture, nurture, and convert leads through proven strategies and powerful tools."
    />
    <meta name="twitter:image" content="https://stuartga.github.io/leadhub-ecommerce/og-image.png" />

    <!-- Theme & Favicon -->
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "LeadHub",
        "url": "https://stuartga.github.io/leadhub-ecommerce/",
        "logo": "https://stuartga.github.io/leadhub-ecommerce/favicon.svg",
        "description": "LeadHub helps businesses capture, nurture, and convert leads through proven strategies and powerful tools.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": "English"
        }
      }
    </script>

    <!-- Structured Data: WebSite (enables Sitelinks Search Box) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "LeadHub",
        "url": "https://stuartga.github.io/leadhub-ecommerce/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
